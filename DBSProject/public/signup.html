<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup - Roommate Matching System</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f8fafc; }
        .container { max-width: 700px; margin: auto; background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; padding: 20px; }
        h2 { margin-top: 0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input, select, textarea, button { width: 100%; padding: 10px; margin: 8px 0; box-sizing: border-box; border: 1px solid #d1d5db; border-radius: 4px; }
        textarea { font-family: Arial, sans-serif; resize: vertical; }
        button { background: #16a34a; border: none; color: #fff; cursor: pointer; border-radius: 6px; }
        button:hover { background: #15803d; }
        .full { grid-column: 1 / -1; }
        .message { margin-top: 10px; padding: 10px; border-radius: 4px; display: none; }
        .message.show { display: block; }
        .error { background: #fee2e2; color: #dc2626; }
        .success { background: #dcfce7; color: #166534; }
        a { color: #16a34a; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Create Account</h2>
        <form id="signupForm">
            <div class="grid">
                <input id="name" type="text" placeholder="Full name" required>
                <input id="email" type="email" placeholder="Email" required>
                <input id="password" type="password" placeholder="Password" required>
                <input id="age" type="number" min="1" placeholder="Age" required>
                <input id="course" type="text" placeholder="Course" required>
                <input id="year" type="number" min="1" placeholder="Year" required>
                <select id="gender" required>
                    <option value="">Gender</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                    <option value="other">Other</option>
                </select>
                <input id="phone" type="text" placeholder="Phone number">
                <input id="city" type="text" placeholder="City">
                <input id="state" type="text" placeholder="State">
                <textarea id="address" class="full" placeholder="Address" rows="2"></textarea>
            </div>
            <button type="submit">Sign Up</button>
        </form>

        <p id="message" class="message"></p>
        <p>Already have an account? <a href="login.html">Login</a></p>
        <p><a href="index.html">Back to Home</a></p>
    </div>

    <script>
        const form = document.getElementById('signupForm');
        const message = document.getElementById('message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const userData = {
                name: document.getElementById('name').value.trim(),
                email: document.getElementById('email').value.trim(),
                password: document.getElementById('password').value,
                age: Number(document.getElementById('age').value),
                course: document.getElementById('course').value.trim(),
                year: Number(document.getElementById('year').value),
                gender: document.getElementById('gender').value,
                phone: document.getElementById('phone').value.trim(),
                address: document.getElementById('address').value.trim(),
                city: document.getElementById('city').value.trim(),
                state: document.getElementById('state').value.trim()
            };

            try {
                const response = await fetch('/api/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });
                const data = await response.json();

                message.classList.add('show');
                if (!response.ok) {
                    message.classList.remove('success');
                    message.classList.add('error');
                    message.textContent = data.error || 'Signup failed';
                    return;
                }

                localStorage.setItem('user', JSON.stringify(data.user));
                message.classList.remove('error');
                message.classList.add('success');
                message.textContent = 'Signup successful. Redirecting...';
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 700);
            } catch (error) {
                message.classList.add('show', 'error');
                message.classList.remove('success');
                message.textContent = 'An error occurred during signup';
            }
        });
    </script>
</body>
</html>
